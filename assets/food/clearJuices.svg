<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="320" height="200" rx="20" fill="url(#bg)"/>
  <circle cx="274" cy="28" r="52" fill="#f59e0b" opacity="0.12"/>
  <circle cx="44" cy="180" r="58" fill="#06b6d4" opacity="0.10"/>
  <path d="M18 20 C56 4, 104 16, 128 40 C92 44, 52 54, 20 84 Z" fill="url(#shine)" opacity="0.55"/>

  <g filter="url(#shadow)" transform="translate(42 34)">
    <!-- Lemonade glass -->
    <g transform="translate(6 8)">
      <rect x="22" y="18" width="74" height="114" rx="14" fill="#ffffff"/>
      <path d="M28 56 H90 V124 H28 Z" fill="#fde68a" opacity="0.88"/>
      <path d="M94 28 L126 8" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
      <circle cx="84" cy="62" r="12" fill="none" stroke="#f59e0b" stroke-width="4"/>
      <path d="M78 58 L90 66" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Orangeade glass -->
    <g transform="translate(132 18)">
      <rect x="22" y="18" width="74" height="104" rx="14" fill="#ffffff"/>
      <path d="M28 52 H90 V114 H28 Z" fill="#fdba74" opacity="0.88"/>
      <circle cx="42" cy="38" r="16" fill="#fb923c"/>
      <circle cx="38" cy="34" r="5" fill="#fed7aa" opacity="0.7"/>
      <path d="M54 26 C64 20, 74 22, 80 30" stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
