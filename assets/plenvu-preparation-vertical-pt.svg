<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 1340" role="img" aria-labelledby="title desc">
  <title id="title">Preparacao com Plenvu</title>
  <desc id="desc">Diagrama vertical com instrucoes para a primeira e segunda Toma do Plenvu.</desc>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #161616; }
    .frame { fill: #ffffff; stroke: #b7b7b7; stroke-width: 4; }
    .divider { stroke: #b7b7b7; stroke-width: 4; }
    .dose-title { font-size: 24px; font-weight: 700; }
    .dose-sub { font-size: 18px; font-weight: 700; }
    .copy { font-size: 17px; }
    .ml { font-size: 18px; font-weight: 700; }
    .note { font-size: 16px; }
    .sachet { fill: #ffffff; stroke: #8a8a8a; stroke-width: 3; stroke-dasharray: 6 4; rx: 5; }
    .sachet-letter { font-size: 20px; font-weight: 700; fill: #555555; }
    .clock-face { fill: #ffffff; stroke: #232323; stroke-width: 3; }
    .clock-hand { stroke: #232323; stroke-width: 3; stroke-linecap: round; }
    .spark { fill: #c8c8c8; }
  </style>
  <defs>
    <linearGradient id="pinkLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e0ff"/>
      <stop offset="68%" stop-color="#dba4eb"/>
      <stop offset="100%" stop-color="#cf85e3"/>
    </linearGradient>
    <linearGradient id="goldLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4b7"/>
      <stop offset="68%" stop-color="#f0d25f"/>
      <stop offset="100%" stop-color="#e5bc39"/>
    </linearGradient>
    <linearGradient id="blueLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f1ff"/>
      <stop offset="68%" stop-color="#abd3f1"/>
      <stop offset="100%" stop-color="#8ebfe3"/>
    </linearGradient>
    <g id="cupPink">
      <ellipse cx="0" cy="-29" rx="22" ry="6" fill="#ffffff" fill-opacity="0.86" stroke="#d6b8df" stroke-width="2"/>
      <path d="M-20 -29 L-14 25 Q0 31 14 25 L20 -29 Z" fill="url(#pinkLiquid)" stroke="#d6b8df" stroke-width="2"/>
      <ellipse cx="0" cy="-5" rx="10" ry="2.5" fill="#ffffff" fill-opacity="0.56"/>
    </g>
    <g id="cupGold">
      <ellipse cx="0" cy="-29" rx="22" ry="6" fill="#ffffff" fill-opacity="0.86" stroke="#d9cb8e" stroke-width="2"/>
      <path d="M-20 -29 L-14 25 Q0 31 14 25 L20 -29 Z" fill="url(#goldLiquid)" stroke="#d9cb8e" stroke-width="2"/>
      <ellipse cx="0" cy="-5" rx="10" ry="2.5" fill="#ffffff" fill-opacity="0.56"/>
    </g>
    <g id="cupBlue">
      <ellipse cx="0" cy="-29" rx="22" ry="6" fill="#ffffff" fill-opacity="0.86" stroke="#b8cfe0" stroke-width="2"/>
      <path d="M-20 -29 L-14 25 Q0 31 14 25 L20 -29 Z" fill="url(#blueLiquid)" stroke="#b8cfe0" stroke-width="2"/>
      <ellipse cx="0" cy="-5" rx="10" ry="2.5" fill="#ffffff" fill-opacity="0.56"/>
    </g>
    <g id="sachetPlain">
      <rect class="sachet" x="-20" y="-14" width="40" height="28" transform="rotate(-16)"/>
      <line x1="-11" y1="-8" x2="11" y2="-14" stroke="#9a9a9a" stroke-width="2"/>
    </g>
    <g id="sachetA">
      <rect class="sachet" x="-22" y="-14" width="44" height="28" transform="rotate(-10)"/>
      <text class="sachet-letter" x="0" y="8" text-anchor="middle">A</text>
    </g>
    <g id="sachetB">
      <rect class="sachet" x="-22" y="-14" width="44" height="28" transform="rotate(8)"/>
      <text class="sachet-letter" x="0" y="8" text-anchor="middle">B</text>
    </g>
    <g id="clock">
      <circle class="clock-face" cx="0" cy="0" r="17"/>
      <line class="clock-hand" x1="0" y1="0" x2="0" y2="-9"/>
      <line class="clock-hand" x1="0" y1="0" x2="7" y2="6"/>
      <circle cx="0" cy="0" r="2" fill="#232323"/>
    </g>
  </defs>

  <rect class="frame" x="20" y="20" width="420" height="1240" rx="10"/>
  <line class="divider" x1="22" y1="640" x2="438" y2="640"/>

  <text class="dose-title" x="230" y="80" text-anchor="middle">1ª Toma de Plenvu®</text>
  <text class="dose-sub" x="230" y="110" text-anchor="middle">Saqueta 1</text>

  <g transform="translate(90 200)">
    <use href="#cupPink"/>
    <g transform="translate(10 -65) rotate(-10)">
      <use href="#sachetPlain"/>
    </g>
    <circle class="spark" cx="-7" cy="-55" r="2"/>
    <circle class="spark" cx="0" cy="-60" r="2"/>
    <circle class="spark" cx="7" cy="-55" r="2"/>
  </g>
  <text class="ml" x="90" y="250" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="180">
    <tspan x="160" dy="0">Abra a saqueta da 1.ª dose</tspan>
    <tspan x="160" dy="22">e dissolva o conteúdo em</tspan>
    <tspan x="160" dy="22">500 ml de água fria</tspan>
  </text>

  <g transform="translate(90 360)">
    <use href="#cupPink"/>
  </g>
  <text class="ml" x="90" y="410" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="350">
    <tspan x="160" dy="0">Beba o preparado da</tspan>
    <tspan x="160" dy="22">dose 1 em 30-45 min</tspan>
  </text>

  <g transform="translate(90 520)">
    <use href="#cupBlue"/>
  </g>
  <text class="ml" x="90" y="570" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="500">
    <tspan x="160" dy="0">Depois beba pelo menos</tspan>
    <tspan x="160" dy="22">500 ml de líquidos</tspan>
    <tspan x="160" dy="22">transparentes</tspan>
  </text>

  <text class="dose-title" x="230" y="700" text-anchor="middle">2ª Toma de Plenvu®</text>
  <text class="dose-sub" x="230" y="730" text-anchor="middle">Saqueta A + Saqueta B</text>

  <g transform="translate(90 820)">
    <use href="#cupGold"/>
    <g transform="translate(-18 -65)">
      <use href="#sachetA"/>
    </g>
    <g transform="translate(18 -65)">
      <use href="#sachetB"/>
    </g>
    <circle class="spark" cx="-7" cy="-55" r="2"/>
    <circle class="spark" cx="0" cy="-60" r="2"/>
    <circle class="spark" cx="7" cy="-55" r="2"/>
  </g>
  <text class="ml" x="90" y="870" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="810">
    <tspan x="160" dy="0">Dissolva as saquetas A e B</tspan>
    <tspan x="160" dy="22">em 500 ml de água fria</tspan>
  </text>

  <g transform="translate(90 980)">
    <use href="#clock" y="-65"/>
    <use href="#cupGold"/>
  </g>
  <text class="ml" x="90" y="1030" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="960">
    <tspan x="160" dy="0">1 hora depois da dose 1,</tspan>
    <tspan x="160" dy="22">beba a dose 2 em</tspan>
    <tspan x="160" dy="22">30-45 min</tspan>
  </text>

  <g transform="translate(90 1140)">
    <use href="#cupBlue"/>
  </g>
  <text class="ml" x="90" y="1190" text-anchor="middle">500ml</text>
  <text class="copy" x="160" y="1120">
    <tspan x="160" dy="0">Por fim beba pelo menos</tspan>
    <tspan x="160" dy="22">500 ml de líquidos</tspan>
    <tspan x="160" dy="22">transparentes</tspan>
  </text>

  <text class="note" x="230" y="1300" text-anchor="middle">
    <tspan x="230" dy="0">**Líquidos transparentes: água, gelatina,</tspan>
    <tspan x="230" dy="20">sumos de fruta sem polpa, chá e café</tspan>
  </text>
</svg>
